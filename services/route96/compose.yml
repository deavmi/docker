services:
  route96:
    build:
      context: ../../images/route96
      dockerfile: Dockerfile
    container_name: blossom
    restart: always
    environment:
      # Logging level
      - "RUST_LOG=${ROUTE96_LOG_LEVEL:-info}"
    volumes:
      # Copy in configuration file to container
      - "${ROUTE96_CONF_PATH}:/app/config.yaml:ro,z"

      # Media storage mount
      - "${ROUTE96_MEDIA_DATA_PATH}:/data:z"
    user: ${USER_UID}:${USER_GID}
