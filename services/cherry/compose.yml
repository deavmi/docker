services:
  cherry:
    container_name: cherry
    image: 
    restart: unless-stopped
    user: ${USER_UID}:${USER_GID}
    volumes:
      # Where blobs are stored
      - "${CHERRY_DATA_DIR}:/blobs:z"

      # Where the database is stored
      - "${CHERRY_DB_DIR}:/db:z"

      # Copy file in
      - "${CHERRY_CONFIG_PATH}:/config.toml"
