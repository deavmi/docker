networks:
  mainNet:
    driver: bridge
    name: mainNet
    enable_ipv6: true
    ipam:
      config:
        - subnet: fde4:492a:fc7f::/48

volumes:
  i2pd_data:

include:
  - minio.yml

  - novasredes/nr.yml
  - git.yml
  - irc.yml

  - networks.yml

  # - im.yml
  # - i2p.yml

# TODO: neaten up and see if we can
# place it elsewhere
  # - ../../services/i2pd/compose.yml

services:
  host-statistics:
    extends:
      file: ../../services/node_exporter/compose.yml
      service: statistics

  yggdrasil:
    extends:
      file: ../../services/yggdrasil/compose.yml
      service: yggdrasil
    network_mode: "host"

  web:
    container_name: web
    build:
      context: web/
    restart: unless-stopped
    depends_on:
      - gitea
  #    - webirc
    networks:
      - mainNet
    volumes:
      # Novasredes public HTML
      - ${CADDY_NOVASREDES_PUBLIC}:/novasredes:z
    environment:
      - "DOMAIN=${CADDY_DOMAIN}"
    ports:
      - "[::]:80:80/tcp"
      - "[::]:80:80/udp" # TODO: Does quick run on non-HTTPS?
      - "[::]:443:443/tcp"
      - "[::]:443:443/udp"
