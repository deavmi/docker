networks:
  mainNet:
    driver: bridge
    name: mainNet
    enable_ipv6: true
    ipam:
      config:
        - subnet: fde4:493b:fc7f::/48


# include:
  # - quassel.yml
  # - bots.yml

services:
  host-statistics:
    extends:
      file: ../../services/node_exporter/compose.yml
      service: statistics
    container_name: host_statistics

  # yggdrasil:
    # extends:
      # file: ../../services/yggdrasil/compose.yml
      # service: yggdrasil
    # container_name: yggdrasil

  registry:
    container_name: registry
    build:
      context: registry/
    networks:
      - mainNet
    

  proxy:
    container_name: proxy
    build:
      context: proxy/
    depends_on:
      - registry
    networks:
      - mainNet
    ports:
      - "[::]:80:80/tcp"
      - "[::]:80:80/udp" # TODO: Does quick run on non-HTTPS?
      - "[::]:443:443/tcp"
      - "[::]:443:443/udp"
      - "[::]:2019:2019/tcp" # TODO: Remove this it is FULL ADMIN PORT (only prometheus must be accessing this)
