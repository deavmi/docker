services:
  ntfy:
    container_name: ntfy
    image: binwiederhier/ntfy
    restart: unless-stopped
    user: ${USER_UID}:${USER_GID}
    command:
      - serve
    volumes:
      - ${NTFY_DATA_PATH}:/var/cache/ntfy:z
      - ${NTFY_ETC_PATH}:/etc/ntfy:z
    networks:
      - mainNet
    ports:
      - ${NTFY_PORT}:80/tcp
