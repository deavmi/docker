include:
  # Network definitions
  - networks.yml

  # Services
  - quassel.yml
  - bots.yml
  - builder.yml
  - i2p.yml

services:
  host-statistics:
    extends:
      file: ../../services/node_exporter/compose.yml
      service: statistics
    container_name: host_statistics

  yggdrasil:
    extends:
      file: ../../services/yggdrasil/compose.yml
      service: yggdrasil
    container_name: yggdrasil
    network_mode: "host"

  mycelium:
    extends:
      file: ../../services/mycelium/compose.yml
      service: mycelium
    container_name: mycelium
    network_mode: "host"

  web:
    container_name: web
    build:
      context: web/
    restart: unless-stopped
    networks:
      - mainNet
    volumes:
      # Data directory to serve static site files
      # from
      - /mnt/datadisk/volumes/web:/webroot:z
    environment:
      - "DOMAIN=${CADDY_DOMAIN}"
    ports:
      - "[::]:80:80/tcp"
      - "[::]:80:80/udp" # TODO: Does quick run on non-HTTPS?
      - "[::]:443:443/tcp"
      - "[::]:443:443/udp"
