volumes:
  i2pd_data:
  i2pd_keys:
  i2pd_dot:

services:
  i2pd:
    extends:
      file: ../../services/i2pd/compose.yml
      service: i2pd
      args:
        - NPROC=1
    # TODO: Can't properly use Docker volumes
    # if we enable this. Thankfully I don't
    # care about storing the data
    # user: ${USER_UID}:${USER_GID}
    environment:
      - I2P_ENABLE_IPV6=true
      - I2P_DISABLE_IPV4=${I2P_DISABLE_IPV4:-false}
      
      - I2PD_YGGDRASIL_ENABLE=false
      # - I2PD_YGGDRASIL_ADDRESS=8888
      
      - I2P_FLOODFILL=false

      # - I2P_LOG_LEVEL=${I2P_LOG_LEVEL:-error}
      - I2P_LOG_LEVEL=info

      - I2P_HTTP_CONSOLE_ENABLE=false
    networks:
      - mainNet
      # - pseudoNetForI2p
    volumes:
      # Router data, all stuff that can be
      # deleted but is useful for caching
      - "i2pd_data:/data:z"
      
      # Configuration base path
      - "./i2p/conf:/conf:z"
      
      # Tunnel key files
      - "i2pd_keys:/keys:z"

      # Tunnels directory
      - "./i2p/tunnels:/tunnels:zr"

      # For mapping .i2pd
      - "i2pd_dot:/.i2pd:z"