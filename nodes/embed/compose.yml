networks:
  mainNet:
    driver: bridge
    name: mainNet
    enable_ipv6: true
    ipam:
      config:
        - subnet: fde4:492a:fc7e::/48

volumes:
  meshtasticData:

services:
  # host-statistics:
    # extends:
      # file: ../../services/node_exporter/compose.yml
      # service: statistics

  # TODO: Enable this
  # yggdrasil:
    # extends:
      # file: ../../services/yggdrasil/compose.yml
      # service: yggdrasil

  meshtastic:
    container_name: meshtasticd
    build:
      context: meshtasticd/
    networks:
      - mainNet
    volumes:
      # Mount point for data storage
      - meshtasticData:/var/lib/meshtasticd
      
    ports:
      # Port for clients to connect to via
      - "${MESHTASTIC_EXTERNAL_PORT}:${MESHTASTIC_INTERNAL_PORT}/tcp"

      # TODO: See if we want this, it generates certificates
      # which is MAJOR aids
      # Web server (TODO: Expose via caddy rather)
      - "${MESHTASTIC_EXTERNAL_WEB_PORT}:443/tcp"

